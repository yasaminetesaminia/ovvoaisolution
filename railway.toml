# Railway service configuration for the API.
#
# Railway looks for this in the repo root. The API lives in apps/api,
# so we point the build at that Dockerfile.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
healthcheckPath = "/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
startCommand = "node --import tsx src/index.ts"
